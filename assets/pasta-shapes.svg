<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="320" fill="#1F2F1F"/>

  <!-- Section dividers -->
  <line x1="300" y1="24" x2="300" y2="296" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="600" y1="24" x2="600" y2="296" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="900" y1="24" x2="900" y2="296" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ======================== -->
  <!-- SPAGHETTI  (col 1 / cx=150) -->
  <!-- ======================== -->
  <g stroke-linecap="round">
    <!-- back / shadow strands -->
    <line x1="110" y1="30" x2="109" y2="218" stroke="#8A5C20" stroke-width="2.5" opacity="0.25"/>
    <line x1="192" y1="28" x2="191" y2="216" stroke="#8A5C20" stroke-width="2.5" opacity="0.25"/>
    <!-- mid strands -->
    <line x1="114" y1="24" x2="113" y2="222" stroke="#C8962A" stroke-width="2.6" opacity="0.5"/>
    <line x1="126" y1="20" x2="126" y2="226" stroke="#D4A840" stroke-width="2.8" opacity="0.65"/>
    <line x1="188" y1="22" x2="187" y2="224" stroke="#D4A840" stroke-width="2.8" opacity="0.65"/>
    <!-- front strands -->
    <line x1="136" y1="16" x2="136" y2="230" stroke="#EDD8A8" stroke-width="3.2"/>
    <line x1="147" y1="12" x2="147" y2="234" stroke="#F8EDD5" stroke-width="3.8"/>
    <line x1="158" y1="15" x2="158" y2="231" stroke="#F0E0BA" stroke-width="3.3"/>
    <line x1="169" y1="14" x2="169" y2="232" stroke="#FFF8E8" stroke-width="4" opacity="0.9"/>
    <line x1="180" y1="18" x2="180" y2="228" stroke="#EDD8A8" stroke-width="3.2"/>
  </g>
  <!-- label -->
  <line x1="90" y1="248" x2="210" y2="248" stroke="#C69A3B" stroke-width="0.75" opacity="0.55"/>
  <text x="150" y="270" font-family="Cormorant Garamond, serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Spaghetti</text>
  <text x="150" y="290" font-family="Inter, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1.8">ALL THREE LINES</text>

  <!-- ======================== -->
  <!-- PENNE  (col 2 / cx=450) -->
  <!-- ======================== -->

  <!-- Penne 1 — center, -20° -->
  <g transform="translate(448,122) rotate(-20)">
    <rect x="-12" y="-50" width="24" height="100" rx="4" fill="#5A3810" transform="translate(2,3)" opacity="0.3"/>
    <rect x="-12" y="-50" width="24" height="100" rx="4" fill="#C8962A"/>
    <rect x="-9" y="-48" width="6" height="96" rx="2.5" fill="rgba(255,255,255,0.2)"/>
    <line x1="-12" y1="-25" x2="12" y2="-25" stroke="rgba(0,0,0,0.22)" stroke-width="1.3"/>
    <line x1="-12" y1="0"   x2="12" y2="0"   stroke="rgba(0,0,0,0.22)" stroke-width="1.3"/>
    <line x1="-12" y1="25"  x2="12" y2="25"  stroke="rgba(0,0,0,0.22)" stroke-width="1.3"/>
    <ellipse cx="0" cy="-50" rx="9" ry="4.5" fill="#4A2808"/>
    <ellipse cx="0" cy="-50" rx="5"  ry="2.2" fill="#1A1A0A"/>
    <ellipse cx="0" cy="50"  rx="9" ry="4.5" fill="#4A2808"/>
    <ellipse cx="0" cy="50"  rx="5"  ry="2.2" fill="#1A1A0A"/>
  </g>

  <!-- Penne 2 — left, 32° -->
  <g transform="translate(410,140) rotate(32)">
    <rect x="-11" y="-44" width="22" height="88" rx="3.5" fill="#5A3810" transform="translate(2,3)" opacity="0.22"/>
    <rect x="-11" y="-44" width="22" height="88" rx="3.5" fill="#BE8C22"/>
    <rect x="-8"  y="-42" width="5"  height="84" rx="2"   fill="rgba(255,255,255,0.17)"/>
    <line x1="-11" y1="-20" x2="11" y2="-20" stroke="rgba(0,0,0,0.2)" stroke-width="1.2"/>
    <line x1="-11" y1="5"   x2="11" y2="5"   stroke="rgba(0,0,0,0.2)" stroke-width="1.2"/>
    <line x1="-11" y1="28"  x2="11" y2="28"  stroke="rgba(0,0,0,0.2)" stroke-width="1.2"/>
    <ellipse cx="0" cy="-44" rx="8" ry="4"   fill="#4A2808"/>
    <ellipse cx="0" cy="-44" rx="4.5" ry="2" fill="#1A1A0A"/>
    <ellipse cx="0" cy="44"  rx="8" ry="4"   fill="#4A2808"/>
    <ellipse cx="0" cy="44"  rx="4.5" ry="2" fill="#1A1A0A"/>
  </g>

  <!-- Penne 3 — right, -10° -->
  <g transform="translate(484,132) rotate(-10)">
    <rect x="-11" y="-46" width="22" height="92" rx="3.5" fill="#5A3810" transform="translate(2,3)" opacity="0.22"/>
    <rect x="-11" y="-46" width="22" height="92" rx="3.5" fill="#D0A038"/>
    <rect x="-8"  y="-44" width="5"  height="88" rx="2"   fill="rgba(255,255,255,0.19)"/>
    <line x1="-11" y1="-23" x2="11" y2="-23" stroke="rgba(0,0,0,0.2)" stroke-width="1.2"/>
    <line x1="-11" y1="3"   x2="11" y2="3"   stroke="rgba(0,0,0,0.2)" stroke-width="1.2"/>
    <line x1="-11" y1="26"  x2="11" y2="26"  stroke="rgba(0,0,0,0.2)" stroke-width="1.2"/>
    <ellipse cx="0" cy="-46" rx="8" ry="4"   fill="#4A2808"/>
    <ellipse cx="0" cy="-46" rx="4.5" ry="2" fill="#1A1A0A"/>
    <ellipse cx="0" cy="46"  rx="8" ry="4"   fill="#4A2808"/>
    <ellipse cx="0" cy="46"  rx="4.5" ry="2" fill="#1A1A0A"/>
  </g>

  <!-- Penne 4 — bottom left, 18° -->
  <g transform="translate(415,192) rotate(18)">
    <rect x="-11" y="-38" width="22" height="76" rx="3.5" fill="#C8962A" opacity="0.7"/>
    <rect x="-8"  y="-36" width="5"  height="72" rx="2"   fill="rgba(255,255,255,0.14)"/>
    <line x1="-11" y1="-16" x2="11" y2="-16" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <line x1="-11" y1="10"  x2="11" y2="10"  stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <ellipse cx="0" cy="-38" rx="8" ry="4"   fill="#3A1E06" opacity="0.85"/>
    <ellipse cx="0" cy="38"  rx="8" ry="4"   fill="#3A1E06" opacity="0.85"/>
  </g>

  <!-- Penne 5 — bottom right, -38° -->
  <g transform="translate(478,188) rotate(-38)">
    <rect x="-11" y="-38" width="22" height="76" rx="3.5" fill="#C8962A" opacity="0.65"/>
    <rect x="-8"  y="-36" width="5"  height="72" rx="2"   fill="rgba(255,255,255,0.12)"/>
    <line x1="-11" y1="-16" x2="11" y2="-16" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <line x1="-11" y1="10"  x2="11" y2="10"  stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <ellipse cx="0" cy="-38" rx="8" ry="4"   fill="#3A1E06" opacity="0.8"/>
    <ellipse cx="0" cy="38"  rx="8" ry="4"   fill="#3A1E06" opacity="0.8"/>
  </g>

  <!-- label -->
  <line x1="390" y1="248" x2="510" y2="248" stroke="#C69A3B" stroke-width="0.75" opacity="0.55"/>
  <text x="450" y="270" font-family="Cormorant Garamond, serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Penne</text>
  <text x="450" y="290" font-family="Inter, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1.8">ALL THREE LINES</text>

  <!-- ======================== -->
  <!-- ELBOWS  (col 3 / cx=750) -->
  <!-- ======================== -->

  <!-- Each elbow: 3 concentric arcs (outer dark / mid gold / inner light / hole) -->
  <!-- Arc formula: M 0,R A R,R 0 0,1 R,0  = quarter circle bottom→right -->

  <!-- Elbow 1 -->
  <g transform="translate(722,105)">
    <path d="M 0,28 A 28,28 0 0,1 28,0" fill="none" stroke="#5A3810" stroke-width="19" stroke-linecap="round" opacity="0.3"/>
    <path d="M 0,28 A 28,28 0 0,1 28,0" fill="none" stroke="#D4A840" stroke-width="17" stroke-linecap="round"/>
    <path d="M 0,28 A 28,28 0 0,1 28,0" fill="none" stroke="#F0DDB0" stroke-width="11" stroke-linecap="round"/>
    <path d="M 0,28 A 28,28 0 0,1 28,0" fill="none" stroke="#1F2F1F" stroke-width="5"  stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Elbow 2, rotated 90° -->
  <g transform="translate(772,94) rotate(90)">
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#5A3810" stroke-width="17" stroke-linecap="round" opacity="0.28"/>
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#C8962A" stroke-width="15" stroke-linecap="round"/>
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#EDD8A8" stroke-width="10" stroke-linecap="round"/>
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#1F2F1F" stroke-width="4"  stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Elbow 3, rotated 45° -->
  <g transform="translate(710,158) rotate(45)">
    <path d="M 0,26 A 26,26 0 0,1 26,0" fill="none" stroke="#5A3810" stroke-width="18" stroke-linecap="round" opacity="0.28"/>
    <path d="M 0,26 A 26,26 0 0,1 26,0" fill="none" stroke="#D0A038" stroke-width="16" stroke-linecap="round"/>
    <path d="M 0,26 A 26,26 0 0,1 26,0" fill="none" stroke="#F5E5C0" stroke-width="11" stroke-linecap="round"/>
    <path d="M 0,26 A 26,26 0 0,1 26,0" fill="none" stroke="#1F2F1F" stroke-width="5"  stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Elbow 4, rotated -30° -->
  <g transform="translate(764,152) rotate(-30)">
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#5A3810" stroke-width="17" stroke-linecap="round" opacity="0.25"/>
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#C8962A" stroke-width="15" stroke-linecap="round"/>
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#F0DDB0" stroke-width="10" stroke-linecap="round"/>
    <path d="M 0,25 A 25,25 0 0,1 25,0" fill="none" stroke="#1F2F1F" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Elbow 5, rotated 160° -->
  <g transform="translate(733,196) rotate(160)">
    <path d="M 0,23 A 23,23 0 0,1 23,0" fill="none" stroke="#D4A840" stroke-width="16" stroke-linecap="round" opacity="0.65"/>
    <path d="M 0,23 A 23,23 0 0,1 23,0" fill="none" stroke="#EDD8A8" stroke-width="11" stroke-linecap="round" opacity="0.65"/>
    <path d="M 0,23 A 23,23 0 0,1 23,0" fill="none" stroke="#1F2F1F" stroke-width="4"  stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Elbow 6, rotated 220° -->
  <g transform="translate(775,188) rotate(220)">
    <path d="M 0,22 A 22,22 0 0,1 22,0" fill="none" stroke="#C8962A" stroke-width="15" stroke-linecap="round" opacity="0.6"/>
    <path d="M 0,22 A 22,22 0 0,1 22,0" fill="none" stroke="#F5E5C0" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <path d="M 0,22 A 22,22 0 0,1 22,0" fill="none" stroke="#1F2F1F" stroke-width="4"  stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Elbow 7, rotated 75° -->
  <g transform="translate(750,215) rotate(75)">
    <path d="M 0,20 A 20,20 0 0,1 20,0" fill="none" stroke="#C8962A" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
    <path d="M 0,20 A 20,20 0 0,1 20,0" fill="none" stroke="#EDD8A8" stroke-width="9"  stroke-linecap="round" opacity="0.5"/>
    <path d="M 0,20 A 20,20 0 0,1 20,0" fill="none" stroke="#1F2F1F" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- label -->
  <line x1="690" y1="248" x2="810" y2="248" stroke="#C69A3B" stroke-width="0.75" opacity="0.55"/>
  <text x="750" y="270" font-family="Cormorant Garamond, serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Elbows</text>
  <text x="750" y="290" font-family="Inter, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1.8">ALL THREE LINES</text>

  <!-- ======================== -->
  <!-- ANGEL HAIR  (col 4 / cx=1050) -->
  <!-- ======================== -->
  <g stroke-linecap="round">
    <!-- Outer faded strands -->
    <line x1="990" y1="32" x2="989" y2="224" stroke="#A87830" stroke-width="1.1" opacity="0.28"/>
    <line x1="998" y1="27" x2="997" y2="220" stroke="#C8962A" stroke-width="1.2" opacity="0.34"/>
    <line x1="1006" y1="22" x2="1005" y2="226" stroke="#C8962A" stroke-width="1.3" opacity="0.42"/>
    <line x1="1014" y1="18" x2="1014" y2="228" stroke="#D4A840" stroke-width="1.3" opacity="0.5"/>
    <line x1="1022" y1="15" x2="1022" y2="230" stroke="#D4A840" stroke-width="1.4" opacity="0.58"/>
    <line x1="1030" y1="13" x2="1030" y2="232" stroke="#EDD8A8" stroke-width="1.5" opacity="0.68"/>
    <!-- core bright strands -->
    <line x1="1038" y1="11" x2="1038" y2="234" stroke="#F0E0B8" stroke-width="1.6" opacity="0.82"/>
    <line x1="1046" y1="10" x2="1046" y2="235" stroke="#F8EDD5" stroke-width="1.8"/>
    <line x1="1054" y1="10" x2="1054" y2="235" stroke="#FFF8E8" stroke-width="2"   opacity="0.95"/>
    <line x1="1062" y1="11" x2="1062" y2="234" stroke="#F8EDD5" stroke-width="1.8"/>
    <line x1="1070" y1="13" x2="1070" y2="232" stroke="#F0E0B8" stroke-width="1.6" opacity="0.82"/>
    <!-- Outer faded strands right -->
    <line x1="1078" y1="15" x2="1078" y2="230" stroke="#EDD8A8" stroke-width="1.5" opacity="0.68"/>
    <line x1="1086" y1="18" x2="1086" y2="228" stroke="#D4A840" stroke-width="1.4" opacity="0.56"/>
    <line x1="1094" y1="22" x2="1094" y2="226" stroke="#D4A840" stroke-width="1.3" opacity="0.46"/>
    <line x1="1102" y1="26" x2="1102" y2="222" stroke="#C8962A" stroke-width="1.2" opacity="0.36"/>
    <line x1="1110" y1="30" x2="1110" y2="220" stroke="#C8962A" stroke-width="1.1" opacity="0.28"/>
  </g>
  <!-- label -->
  <line x1="985" y1="248" x2="1115" y2="248" stroke="#C69A3B" stroke-width="0.75" opacity="0.55"/>
  <text x="1050" y="270" font-family="Cormorant Garamond, serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Angel Hair</text>
  <text x="1050" y="290" font-family="Inter, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1.8">ALL THREE LINES</text>

</svg>
