<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <path id="org-top" d="M 8,100 A 92,92 0 0,1 192,100"/>
    <path id="org-bot" d="M 192,100 A 92,92 0 0,1 8,100"/>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="97" fill="white" stroke="#B8960C" stroke-width="1.8"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#B8960C" stroke-width="1.2"/>
  <!-- Side dashes -->
  <line x1="2" y1="100" x2="12" y2="100" stroke="#B8960C" stroke-width="2.5"/>
  <line x1="188" y1="100" x2="198" y2="100" stroke="#B8960C" stroke-width="2.5"/>
  <!-- Curved text top -->
  <text fill="#B8960C" font-family="Inter,Helvetica,sans-serif" font-size="12.5" font-weight="600" letter-spacing="3">
    <textPath href="#org-top" startOffset="50%" text-anchor="middle">ORGANIC</textPath>
  </text>
  <!-- Curved text bottom -->
  <text fill="#B8960C" font-family="Inter,Helvetica,sans-serif" font-size="12.5" font-weight="600" letter-spacing="3">
    <textPath href="#org-bot" startOffset="50%" text-anchor="middle">CERTIFIED</textPath>
  </text>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="63" fill="none" stroke="#B8960C" stroke-width="1.8"/>
  <!-- Left leaf -->
  <path d="M 100,122 C 95,112 74,98 76,74 C 88,80 100,108 100,122 Z" fill="#B8960C"/>
  <!-- Right leaf -->
  <path d="M 100,122 C 105,112 126,98 124,74 C 112,80 100,108 100,122 Z" fill="#B8960C"/>
  <!-- Stem -->
  <line x1="100" y1="122" x2="100" y2="136" stroke="#B8960C" stroke-width="2.2"/>
</svg>
