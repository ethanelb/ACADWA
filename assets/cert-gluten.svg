<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <path id="gf-top" d="M 8,100 A 92,92 0 0,1 192,100"/>
    <path id="gf-bot" d="M 192,100 A 92,92 0 0,1 8,100"/>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="97" fill="white" stroke="#B8960C" stroke-width="1.8"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#B8960C" stroke-width="1.2"/>
  <!-- Side dashes -->
  <line x1="2" y1="100" x2="12" y2="100" stroke="#B8960C" stroke-width="2.5"/>
  <line x1="188" y1="100" x2="198" y2="100" stroke="#B8960C" stroke-width="2.5"/>
  <!-- Curved text top -->
  <text fill="#B8960C" font-family="Inter,Helvetica,sans-serif" font-size="12" font-weight="600" letter-spacing="3">
    <textPath href="#gf-top" startOffset="50%" text-anchor="middle">GLUTEN FREE</textPath>
  </text>
  <!-- Curved text bottom -->
  <text fill="#B8960C" font-family="Inter,Helvetica,sans-serif" font-size="12" font-weight="600" letter-spacing="3">
    <textPath href="#gf-bot" startOffset="50%" text-anchor="middle">FREE</textPath>
  </text>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="63" fill="none" stroke="#B8960C" stroke-width="1.8"/>
  <!-- Wheat stalk (tilted ~15deg clockwise) -->
  <g transform="rotate(15,100,97)">
    <!-- Central stem -->
    <line x1="100" y1="132" x2="100" y2="60" stroke="#B8960C" stroke-width="2"/>
    <!-- Top tip -->
    <path d="M 98,62 C 96,56 98,51 100,49 C 102,51 104,56 102,62 Z" fill="#B8960C"/>
    <!-- Grain pairs from bottom to top -->
    <ellipse cx="92" cy="123" rx="7.5" ry="4" fill="#B8960C" transform="rotate(-35,92,123)"/>
    <ellipse cx="108" cy="123" rx="7.5" ry="4" fill="#B8960C" transform="rotate(35,108,123)"/>
    <ellipse cx="91" cy="112" rx="7.5" ry="4" fill="#B8960C" transform="rotate(-35,91,112)"/>
    <ellipse cx="109" cy="112" rx="7.5" ry="4" fill="#B8960C" transform="rotate(35,109,112)"/>
    <ellipse cx="91" cy="101" rx="7.5" ry="4" fill="#B8960C" transform="rotate(-35,91,101)"/>
    <ellipse cx="109" cy="101" rx="7.5" ry="4" fill="#B8960C" transform="rotate(35,109,101)"/>
    <ellipse cx="91" cy="90" rx="7.5" ry="4" fill="#B8960C" transform="rotate(-35,91,90)"/>
    <ellipse cx="109" cy="90" rx="7.5" ry="4" fill="#B8960C" transform="rotate(35,109,90)"/>
    <ellipse cx="92" cy="79" rx="7" ry="3.8" fill="#B8960C" transform="rotate(-35,92,79)"/>
    <ellipse cx="108" cy="79" rx="7" ry="3.8" fill="#B8960C" transform="rotate(35,108,79)"/>
    <ellipse cx="93" cy="69" rx="6" ry="3.5" fill="#B8960C" transform="rotate(-35,93,69)"/>
    <ellipse cx="107" cy="69" rx="6" ry="3.5" fill="#B8960C" transform="rotate(35,107,69)"/>
  </g>
  <!-- Diagonal slash (no-gluten line) -->
  <line x1="66" y1="63" x2="134" y2="135" stroke="#B8960C" stroke-width="2.5"/>
</svg>
